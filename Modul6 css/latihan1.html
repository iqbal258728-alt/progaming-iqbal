<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .solid {
            border: 3px solid black;
            padding: 10px;
            margin: 10px;
        }

        .ridge {
            border: 3px ridge red;
            padding: 10px;
            margin: 10px;
        }

        .double {
            border: 3px dotted blue;
            padding: 10px;
            margin: 10px;
        }

        .groove {
            border: 6px groove green;
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Buat 4 kotak dengan:</h1>
    <div class="solid">Garis Solid</div>
    <div class="ridge">Garis Ridge</div>
    <div class="double">Garis Double</div>
    <div class="groove">Garis Groove</div>
</body>
</html>
