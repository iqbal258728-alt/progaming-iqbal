<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <title>Praktik Border 1</title>
    <style>
        .solid {
            border: 3px solid blue;
            padding: 10px;
            background-color: aqua;
        }

        .dotted {
            border: 3px dotted red;
            padding: 10px;
            background-color: aqua;
        }

        .double {
            border: 5px double rebeccapurple;
            padding: 10px;
            background-color: aqua;
        }
        .dashed{
            border: 5px dashed pink;
            padding: 10px;
            background-color: aqua;
        }
        .groove{
            border: 5px groove black;
            padding: 10px;
            background-color: aqua;
        }
        .ridge{
            border: 5px ridge gray;
            padding: 10px;
            background-color: aqua;
        }
    </style>
</head>

<body>

    <h2>Contoh Border CSS</h2>

    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>
</body>

</html>
