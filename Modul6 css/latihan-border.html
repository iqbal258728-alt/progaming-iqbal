<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garis dalam CSS</title>
    <style>
        body {
            font-family: sans-serif;
        }

        header {
            border: 2px solid blue;
            text-align: center;
            margin-bottom: 1em;
            border-style: dotted;
        }

        article {
            border: 2px solid fuchsia;
            padding: 1em;
            margin-bottom: 1em;
        }

        footer {
            text-align: center;
            padding: 0.5em;
            border: 2px solid green;
        }
    </style>
</head>

<body>
    <header>
        <h1>Latihan CSS Border</h1>
    </header>

    <article>
        Ini adalah contoh paaragraf artikel buat Latihan
        properti border di CSS.Properti border adalah properti
        untuk membuat garis pada sisi elemen html. Sehingga,
        bisa terlihat ada pemisah dan menjadi kesatun.
    </article>

    <footer>
        &copy; 2026 CSS - X PPLG
    </footer>
</body>

</html>
