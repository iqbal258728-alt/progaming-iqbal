<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas CSS Relative Positioning</title>
    <style>
        .box-1 {
            position: relative;
            left: 50px;
            top: 120px;
            background-color: #e74c3c;
            width: 400px;
            height: 100px;
        }
        .box-2 {
            position: relative;
            left: 100px;
            top: 120px;  
            width: 350px;
            height: 100px;
            background-color: #2ecc71;
        }

        .box-3 {
            position: relative;
            left: 150px; 
            top: 120px; 
            background-color: #f1c40f;
            width: 300px;
            height: 100px;
        }
    </style>
</head>
<body>
        <div class="box box-1">Box 1</div>
        <div class="box box-2">Box 2</div>
        <div class="box box-3">Box 3</div>

</body>
</html>
