<!DOCTYPE html>
<html>

<head>
    <style>
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            background-color: lightgray;
        }

        .box {
            position: absolute;
            top: 50px;
            left: 50px;
            background-color: coral;
            width: 100px;
            height: 100px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">Absolute</div>
    </div>
</body>

</html>
