<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Box Model</title>
    <style>
        body {
            font-family: 'segoe UI', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background-color: snow;
        }

        header {
            margin-bottom: 2em;
            text-align: center;
        }

        .button-cta {
            display: block;
            margin-bottom: 1em;
            padding: 0.5em 1 em;
            border-radius: 0.5em;
            border: 1px solid navy;
            color: black;
        }

        article {
            border: 1px solid silver;
            border-radius: 0.8em;
            padding: 1em;
            margin-bottom: 1em;
            background-color: white;
        }

        .action-buttons {
            margin-top: 1.5em;
        }

        .action-buttons button {
            display: inline;
            margin-right: 1em;
            padding: 0.5em 1em;
            border-radius: 0.8em;
            border: 1px solid silver;
        }

        footer {
            font-size: small;
            margin-top: 6em;
            text-align: center;
        }
    </style>
</head>

<body>
    <header>
        <h1>Blog Sederhana</h1>
        <p>Contoh blog sederhana dengan box model</p>

        <div>
            <button class="buttton-cta">Login</button>
            <button class="button-cta">Registrasi</button>
        </div>
    </header>

    <article>
        <p>Box model adalah model yang di pakai untuk menampilkan elemen html di browser.
            Model ini akan memudahkan kita mengatur ukuran,posisi,dan properti lainnya.
        </p>

        <div class="action-buttons">
            <button>&#x1F44D</button>
            <button>&#128552 Comment</button>
            <button>&#xf16d</button>
        </div>
    </article>



    <footer>
        Copyright &copy; X PPLG
    </footer>
</body>

</html>
