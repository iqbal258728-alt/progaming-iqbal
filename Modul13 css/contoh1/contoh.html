<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contoh6</title>
    <style>
        body{
            font-family: Arial,sans-serif;
        }
        /* Gaya dasar Menu */
        .menu {
            background-color: #333;
            overflow: hidden;
        }
        .menu a{
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            padding: 14px 20px;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        /* Efek hover */
        .menu a:hover{
            background-color: green;
            color: white
        }
    </style>
</head>
<body>
    <h2>Contoh Menu Hover</h2>

    <div class="menu">
        <a href="#">Beranda</a>
        <a href="#">Tentang</a>
        <a href="#">Layanan</a>
        <a href="#">kotak</a>
    </div>
</body>
</html>
